server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html index.htm;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Tentar arquivos estáticos; redirecionar para index.php (front-controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Projetos em www/
    location /www/ {
        alias /var/www/projects/;
        index index.php index.html index.htm;
        try_files $uri $uri/ @www_fallback;
    }

    location ~ ^/www/(.+\.php)$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/projects/$1;
        include        fastcgi_params;
    }

    location @www_fallback {
        rewrite ^/www/(.*)$ /www/$1/index.php last;
    }

    # Processar PHP via FPM (localhost, pois FPM roda no mesmo container)
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Bloquear acesso a arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # Assets estáticos dos projetos em /www/ — deve vir ANTES do bloco genérico
    # (em Nginx, quando vários regex batem, o primeiro declarado vence)
    location ~ ^/www/(.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
        alias /var/www/projects/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache de assets estáticos do root (dashboard)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
