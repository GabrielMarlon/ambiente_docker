server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html index.htm;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ---------------------------------------------------------------
    # RAIZ do servidor (dashboard)
    # front-controller: tudo que não for arquivo/pasta vai para index.php
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------------------------------------------------------------
    # Bloquear dotfiles (.htaccess, .env, etc.) — regex declarado
    # primeiro para ter prioridade sobre qualquer outro bloco regex
    # ---------------------------------------------------------------
    location ~ /\. {
        deny all;
    }

    # ---------------------------------------------------------------
    # Assets estáticos dentro de /www/ (CSS, JS, imagens, fontes…)
    # Captura qualquer profundidade: /www/cat/proj/assets/style.css
    # Deve vir ANTES do bloco PHP para não passar arquivos estáticos ao FPM
    # ---------------------------------------------------------------
    location ~ ^/www/(.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|map))$ {
        alias /var/www/projects/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------------------------------------------------------------
    # PHP em qualquer nível de subpasta dentro de /www/
    # Exemplos cobertos:
    #   /www/albiontrade/index.php
    #   /www/jogos/albiontrade/pages/dashboard.php
    #   /www/cat/sub/proj/app/actions/login.php
    # ---------------------------------------------------------------
    location ~ ^/www/(.+\.php)$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/projects/$1;
        include        fastcgi_params;
    }

    # ---------------------------------------------------------------
    # Navegação em /www/ — subpastas aninhadas infinitamente
    #
    # Comportamento:
    #   - Se existir index.php ou index.html na pasta → serve o arquivo
    #     (Nginx faz redirect interno para o bloco PHP acima)
    #   - Se não existir index → exibe listagem do diretório (autoindex)
    #   - Vale para qualquer profundidade: /www/, /www/cat/, /www/cat/proj/
    # ---------------------------------------------------------------
    location /www/ {
        alias /var/www/projects/;
        index index.php index.html index.htm;

        autoindex on;              # lista pastas quando não há index
        autoindex_exact_size off;  # tamanhos legíveis (KB, MB)
        autoindex_localtime on;    # datas no fuso local

        try_files $uri $uri/ =404;
    }

    # ---------------------------------------------------------------
    # PHP no root (dashboard principal)
    # ---------------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ---------------------------------------------------------------
    # Cache de assets estáticos no root (dashboard)
    # ---------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
