# =============================================================
# Ambiente de desenvolvimento web — PHP + Apache/Nginx + DBs
# Use: docker compose --profile apache up -d
#      docker compose --profile nginx  up -d
# =============================================================

networks:
  devnet:
    driver: bridge

volumes:
  mysql_data:
  mariadb_data:
  prometheus_data:
  grafana_data:
  zabbix_db_data:
  zabbix_server_data:

services:

  # -----------------------------------------------------------
  # PHP + Apache  →  make apache
  # -----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev_web_apache
    restart: unless-stopped
    profiles: [apache]
    ports:
      - "${PORT_HTTP:-80}:80"
    volumes:
      - ./dashboard:/var/www/html:rw
      - ./www:/var/www/projects:rw
      - ./config/apache/vhost.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "984"
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
    depends_on:
      - mysql
      - mariadb
    networks:
      - devnet

  # -----------------------------------------------------------
  # PHP + Nginx  →  make nginx
  # -----------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: dev_web_nginx
    restart: unless-stopped
    profiles: [nginx]
    ports:
      - "${PORT_HTTP:-80}:80"
    volumes:
      - ./dashboard:/var/www/html:rw
      - ./www:/var/www/projects:rw
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "984"
    depends_on:
      - mysql
      - mariadb
    networks:
      - devnet

  # -----------------------------------------------------------
  # MySQL
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: dev_mysql
    restart: unless-stopped
    ports:
      - "${PORT_MYSQL:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      #MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
    networks:
      - devnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # MariaDB
  # -----------------------------------------------------------
  mariadb:
    image: mariadb:11
    container_name: dev_mariadb
    restart: unless-stopped
    ports:
      - "${PORT_MARIADB:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      #MARIADB_DATABASE:      ${MARIADB_DATABASE}
      MARIADB_USER:          ${MARIADB_USER}
      MARIADB_PASSWORD:      ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - devnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # cAdvisor — exporta métricas de containers para o Prometheus
  # -----------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: dev_cadvisor
    restart: unless-stopped
    profiles: [monitoring]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "${PORT_CADVISOR:-8090}:8080"
    networks:
      - devnet

  # -----------------------------------------------------------
  # Prometheus — coleta e armazena métricas
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: dev_prometheus
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "${PORT_PROMETHEUS:-9090}:9090"
    depends_on:
      - cadvisor
    networks:
      - devnet

  # -----------------------------------------------------------
  # Grafana — dashboards e visualização
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: dev_grafana
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    ports:
      - "${PORT_GRAFANA:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - devnet

  # -----------------------------------------------------------
  # Zabbix — banco de dados dedicado (PostgreSQL)
  # -----------------------------------------------------------
  zabbix_db:
    image: postgres:16-alpine
    container_name: dev_zabbix_db
    restart: unless-stopped
    profiles: [zabbix]
    environment:
      POSTGRES_USER:     zabbix
      POSTGRES_PASSWORD: zabbix123
      POSTGRES_DB:       zabbix
    volumes:
      - zabbix_db_data:/var/lib/postgresql/data
    networks:
      - devnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Zabbix Server
  # -----------------------------------------------------------
  zabbix_server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    container_name: dev_zabbix_server
    restart: unless-stopped
    profiles: [zabbix]
    environment:
      DB_SERVER_HOST:    dev_zabbix_db
      POSTGRES_USER:     zabbix
      POSTGRES_PASSWORD: zabbix123
      POSTGRES_DB:       zabbix
    ports:
      - "${PORT_ZABBIX:-10051}:10051"
    volumes:
      - zabbix_server_data:/var/lib/zabbix
    depends_on:
      zabbix_db:
        condition: service_healthy
    networks:
      - devnet

  # -----------------------------------------------------------
  # Zabbix Web UI
  # -----------------------------------------------------------
  zabbix_web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
    container_name: dev_zabbix_web
    restart: unless-stopped
    profiles: [zabbix]
    environment:
      ZBX_SERVER_HOST:   dev_zabbix_server
      DB_SERVER_HOST:    dev_zabbix_db
      POSTGRES_USER:     zabbix
      POSTGRES_PASSWORD: zabbix123
      POSTGRES_DB:       zabbix
      PHP_TZ:            America/Sao_Paulo
    ports:
      - "${PORT_ZABBIX_WEB:-8085}:8080"
    depends_on:
      - zabbix_server
      - zabbix_db
    networks:
      - devnet

  # -----------------------------------------------------------
  # Zabbix Agent 2 (monitora containers via Docker socket)
  # -----------------------------------------------------------
  zabbix_agent:
    image: zabbix/zabbix-agent2:alpine-latest
    container_name: dev_zabbix_agent
    restart: unless-stopped
    profiles: [zabbix]
    environment:
      ZBX_SERVER_HOST:   dev_zabbix_server
      ZBX_HOSTNAME:      dev-environment
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "984"
    networks:
      - devnet
    depends_on:
      - zabbix_server

  # -----------------------------------------------------------
  # phpMyAdmin
  # -----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: dev_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PORT_PHPMYADMIN:-8081}:80"
    environment:
      PMA_ARBITRARY:    1
      PMA_HOST:         mysql
      PMA_PORT:         3306
      PMA_CONTROLUSER:  ${PMA_CONTROLUSER}
      PMA_CONTROLPASS:  ${PMA_CONTROLPASS}
    volumes:
      - ./config/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devnet
