# =============================================================
# Ambiente de desenvolvimento web — PHP + Apache/Nginx + DBs
# =============================================================

networks:
  devnet:
    driver: bridge

volumes:
  mysql_data:
  mariadb_data:

services:

  # -----------------------------------------------------------
  # PHP + Apache (porta 80)
  # -----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev_web_apache
    restart: unless-stopped
    ports:
      - "${PORT_HTTP:-80}:80"
    volumes:
      - ./www:/var/www/html:rw
      - ./config/apache/vhost.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
    depends_on:
      - mysql
      - mariadb
    networks:
      - devnet

  # -----------------------------------------------------------
  # PHP + Nginx (porta 8080) — compartilha o mesmo código
  # -----------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: dev_web_nginx
    restart: unless-stopped
    ports:
      - "${PORT_NGINX:-8080}:80"
    volumes:
      - ./www:/var/www/html:rw
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      - mysql
      - mariadb
    networks:
      - devnet

  # -----------------------------------------------------------
  # MySQL
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: dev_mysql
    restart: unless-stopped
    ports:
      - "${PORT_MYSQL:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
    networks:
      - devnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # MariaDB
  # -----------------------------------------------------------
  mariadb:
    image: mariadb:11
    container_name: dev_mariadb
    restart: unless-stopped
    ports:
      - "${PORT_MARIADB:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${MARIADB_DATABASE}
      MARIADB_USER:          ${MARIADB_USER}
      MARIADB_PASSWORD:      ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - devnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # phpMyAdmin — gerencia MySQL e MariaDB
  # -----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: dev_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PORT_PHPMYADMIN:-8081}:80"
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST:      mysql
      PMA_PORT:      3306
    volumes:
      - ./config/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devnet
